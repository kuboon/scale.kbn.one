  - exponent: 8
    name: 地球-月間距離
    nameEn: Earth-Moon Distance
    label: 約38万 km
    description: 月までの平均距離。光が1.3秒で届く

  - exponent: 9
    name: 太陽の直径
    nameEn: Sun's Diameter
    label: 約139万 km
    description: 太陽の直径。木星軌道の1/1000

  - exponent: 11
    name: 地球-太陽間距離
    nameEn: Earth-Sun Distance
    label: 約1.5億 km
    description: 1天文単位。光が8分で届く

  - exponent: 12
    name: 太陽系内部
    nameEn: Inner Solar System
    label: 約15億 km
    description: 木星の公転軌道の直径

  - exponent: 13
    name: 太陽系
    nameEn: Solar System
    label: 約90億 km
    description: 海王星の公転軌道の直径。光が14時間

  - exponent: 16
    name: 1光年
    nameEn: Light Year
    label: 9.5×10¹⁵ m
    description: 光が1年間に進む距離。最も近い恒星は4.2光年

  - exponent: 18
    name: 星間雲
    nameEn: Interstellar Cloud
    label: 約24光年
    description: オリオン星雲の大きさ

  - exponent: 21
    name: 天の川銀河
    nameEn: Milky Way Galaxy
    label: 約10万光年
    description: 天の川銀河の直径

  - exponent: 23
    name: 銀河群
    nameEn: Galaxy Group
    label: 約1,000万光年
    description: 局部銀河群の大きさ

  - exponent: 25
    name: 銀河フィラメント
    nameEn: Galaxy Filament
    label: 約10億光年
    description: 宇宙の大規模構造。銀河が糸状に連なる

  - exponent: 27
    name: 観測可能な宇宙
    nameEn: Observable Universe
    label: 約930億光年
    description: 観測可能な宇宙の直径
