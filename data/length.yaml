meta:
  id: length
  title: 長さのスケール
  subtitle: プランク長から観測可能な宇宙まで
  unit: メートル
  unitSymbol: m
  minExponent: -35
  maxExponent: 27
  pixelsPerExponent: 300

entries:
  - exponent: -35
    name: プランク長
    nameEn: Planck Length
    label: 1.6×10⁻³⁵ m
    description: 物理学で意味を持つ最小の長さ

  - exponent: -18
    name: クォークの大きさ
    nameEn: Quark Scale
    label: 10⁻¹⁸ m
    description: クォークの実験的上限サイズ。素粒子物理の世界

  - exponent: -15
    name: 陽子の直径
    nameEn: Proton Diameter
    label: 約1 fm
    description: 原子核を構成する陽子の大きさ

  - exponent: -12
    name: 水素原子核間距離
    nameEn: Hydrogen Bond Length
    label: 約1 pm
    description: 分子内の原子間の結合距離のスケール

  - exponent: -10
    name: 原子
    nameEn: Atom
    label: 約1 Å
    description: 水素原子の直径。物質の基本単位

  - exponent: -9
    name: DNA幅
    nameEn: DNA Width
    label: 約2 nm
    description: DNA二重らせんの直径。ナノテクノロジーの領域

  - exponent: -8
    name: ウイルス
    nameEn: Virus
    label: 約100 nm
    description: インフルエンザウイルスの大きさ

  - exponent: -7
    name: 可視光の波長
    nameEn: Visible Light Wavelength
    label: 380〜780 nm
    description: 人間の目に見える光の波長

  - exponent: -6
    name: 細菌
    nameEn: Bacteria
    label: 約2 μm
    description: 大腸菌の大きさ。光学顕微鏡で見える限界

  - exponent: -5
    name: 赤血球
    nameEn: Red Blood Cell
    label: 約7 μm
    description: 赤血球の直径。細胞のスケール

  - exponent: -4
    name: 髪の毛の太さ
    nameEn: Human Hair Width
    label: 約70 μm
    description: 人間の髪の毛の直径。肉眼で見える限界付近

  - exponent: -3
    name: アリ
    nameEn: Ant
    label: 約1 mm
    description: 小さなアリの体長。砂粒の大きさ

  - exponent: -2
    name: 1円玉
    nameEn: One Yen Coin
    label: 2 cm
    description: 1円玉の直径。指先の幅

  - exponent: -1
    name: 手のひら
    nameEn: Human Palm
    label: 約10 cm
    description: 手のひらの幅。りんご1個

  - exponent: 0
    name: 人間の腕の長さ
    nameEn: Human Arm Length
    label: 約1 m
    description: 人間の腕の長さ。ギターの全長

  - exponent: 1
    name: バス
    nameEn: Bus
    label: 約10 m
    description: 路線バスの全長。クジラの体長

  - exponent: 2
    name: サッカー場
    nameEn: Soccer Field
    label: 約100 m
    description: サッカーフィールドの長さ

  - exponent: 3
    name: 山
    nameEn: Mountain
    label: 3,776 m
    description: 富士山の標高。深海の深さ

  - exponent: 4
    name: 都市
    nameEn: City
    label: 約34 km
    description: 東京の山手線一周の距離

  - exponent: 5
    name: 日本列島の幅
