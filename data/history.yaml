meta:
  id: history
  title: 宇宙史のスケール
  subtitle: ビッグバンから現代まで
  unit: 年前
  unitSymbol: 年前
  minExponent: 0
  maxExponent: 10
  pixelsPerExponent: 3000

entries:
  - exponent: 10
    value: 1.38
    name: ビッグバン
    nameEn: Big Bang
    description: 宇宙の誕生、時間と空間の始まり

  - exponent: 10
    value: 1.3
    name: 最初の星の誕生
    nameEn: First Stars
    description: 宇宙で最初の恒星が水素ガスから誕生

  - exponent: 10
    value: 1.3
    name: 天の川銀河の形成
    nameEn: Milky Way Formation
    description: 私たちの銀河が形を成し始める

  - exponent: 9
    value: 4.6
    name: 太陽系の誕生
    nameEn: Birth of the Solar System
    description: ガス雲の収縮から太陽と惑星が形成

  - exponent: 9
    value: 4.5
    name: 地球の誕生
    nameEn: Birth of the Earth
    description: 微惑星の衝突・合体により地球が形成

  - exponent: 9
    value: 4.5
    name: 月の形成
    nameEn: Formation of the Moon
    description: 巨大衝突（ジャイアント・インパクト）で月が誕生

  - exponent: 9
    value: 4.4
    name: 最初の海
    nameEn: First Oceans
    description: 地球が冷え、水蒸気が凝結して海洋が形成

  - exponent: 9
    value: 4
    name: 最初の生命
    nameEn: First Life
    description: 海底の熱水噴出孔付近で原始的な微生物が誕生

  - exponent: 9
    value: 3.5
    name: 光合成の始まり
    nameEn: First Photosynthesis
    description: シアノバクテリアが光合成を開始

  - exponent: 9
    value: 2.4
    name: 大酸化イベント
    nameEn: Great Oxidation Event
    description: 大気中の酸素濃度が急上昇、地球環境が一変

  - exponent: 9
    value: 2
    name: 真核生物の出現
    nameEn: First Eukaryotes
    description: 核を持つ細胞の誕生。複雑な生命への第一歩

  - exponent: 9
    value: 1
    name: 多細胞生物の出現
    nameEn: First Multicellular Life
    description: 単細胞から多細胞への進化

  - exponent: 8
    value: 5.4
    name: カンブリア爆発
    nameEn: Cambrian Explosion
    description: 多様な動物門が一斉に出現した生命の大爆発

  - exponent: 8
    value: 5
    name: 魚類の出現
    nameEn: First Fish
    description: 脊椎動物の祖先が海に登場

  - exponent: 8
    value: 4.7
    name: 植物の上陸
    nameEn: Plants Colonize Land
    description: 植物が初めて陸地に進出

  - exponent: 8
    value: 4
    name: 昆虫の出現
    nameEn: First Insects
    description: 陸上で最初の昆虫が進化

  - exponent: 8
    value: 3.7
    name: 両生類の上陸
    nameEn: First Amphibians
    description: 脊椎動物が初めて陸に上がる

  - exponent: 8
    value: 2.3
    name: 恐竜の時代の始まり
    nameEn: Age of Dinosaurs Begins
    description: 三畳紀に恐竜が出現

  - exponent: 8
    value: 2
    name: 哺乳類の出現
    nameEn: First Mammals
    description: 小型の哺乳類が恐竜と共存を開始

  - exponent: 8
    value: 1.5
    name: 鳥類の出現
    nameEn: First Birds
    description: 始祖鳥など恐竜から鳥類が進化

  - exponent: 8
    value: 1.3
    name: 被子植物（花）の出現
    nameEn: First Flowering Plants
    description: 花を咲かせる植物が登場し生態系を変革

  - exponent: 7
    value: 6.6
    name: 恐竜の絶滅
    nameEn: Dinosaur Extinction
    description: 小惑星衝突による大量絶滅（K-Pg境界）

  - exponent: 7
    value: 5.5
    name: 霊長類の出現
    nameEn: First Primates
    description: 恐竜絶滅後、霊長類が多様化

  - exponent: 7
    value: 5
    name: ヒマラヤ山脈の形成開始
    nameEn: Himalayas Begin Forming
    description: インドプレートがユーラシアに衝突

  - exponent: 7
    value: 2.5
    name: 類人猿の出現
    nameEn: First Apes
    description: サルから類人猿への分岐

  - exponent: 6
    value: 7
    name: 人類とチンパンジーの分岐
    nameEn: Human-Chimpanzee Split
    description: 人類の系統がチンパンジーと分かれる

  - exponent: 6
    value: 4
    name: 直立二足歩行
    nameEn: Bipedalism
    description: アウストラロピテクスが二足歩行を確立

  - exponent: 6
    value: 2.6
    name: 石器の使用開始
    nameEn: First Stone Tools
    description: 最古の石器（オルドワン石器）の制作

  - exponent: 6
    value: 1.9
    name: ホモ・エレクトスの出現
    nameEn: Homo Erectus
    description: 火の使用を始めた人類の祖先

  - exponent: 5
    value: 3
    name: ホモ・サピエンスの誕生
    nameEn: Homo Sapiens
    description: 現生人類がアフリカで誕生

  - exponent: 5
    value: 1
    name: 言語の発達
    nameEn: Development of Language
    description: 複雑な言語コミュニケーションの始まり

  - exponent: 4
    value: 4
    name: 洞窟壁画
    nameEn: Cave Paintings
    description: ラスコーやアルタミラの芸術的表現

  - exponent: 4
    value: 1
    name: 農業革命
    nameEn: Agricultural Revolution
    description: 作物の栽培と家畜の飼育が始まり定住生活へ

  - exponent: 3
    value: 5
    name: 文字の発明
    nameEn: Invention of Writing
    description: メソポタミアの楔形文字、歴史時代の始まり

  - exponent: 3
    value: 4.5
    name: ピラミッド建設
    nameEn: Great Pyramids Built
    description: 古代エジプト文明の象徴

  - exponent: 3
    value: 2.5
    name: 古代ギリシャ哲学
    nameEn: Ancient Greek Philosophy
    description: ソクラテス、プラトン、アリストテレス

  - exponent: 3
    value: 2
    name: ローマ帝国の最盛期
    nameEn: Roman Empire at Its Peak
    description: 地中海世界を支配した巨大帝国

  - exponent: 3
    value: 1.4
