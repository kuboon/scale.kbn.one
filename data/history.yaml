    nameEn: Printing Press
    description: グーテンベルクの印刷革命（1440年頃）

  - exponent: 2
    value: 2.5
    name: 産業革命
    nameEn: Industrial Revolution
    description: 蒸気機関が社会を根本から変革（1770年代）

  - exponent: 2
    value: 1.58
    name: 明治維新
    nameEn: Meiji Restoration
    description: 日本の近代化の始まり、封建制度から近代国家へ（1868年）

  - exponent: 2
    value: 1.4
